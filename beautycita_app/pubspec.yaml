name: beautycita
description: "BeautyCita — Intelligent Beauty Booking Agent"
publish_to: 'none'
version: 1.2.1+60160

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  audioplayers: ^6.1.0
  sensors_plus: ^7.0.0
  flutter_riverpod: ^2.6.1
  go_router: ^17.2.0
  local_auth: ^3.0.1
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  intl: ^0.20.2
  supabase_flutter: ^2.8.0
  flutter_dotenv: ^5.2.1
  flutter_animate: ^4.5.2
  geolocator: ^14.0.2
  app_links: ^7.0.0
  http: ^1.2.0
  mobile_scanner: ^7.0.0
  image_picker: ^1.1.2
  file_picker: ^8.1.4
  camera: ^0.11.0
  image_gallery_saver_plus: ^4.0.1
  share_plus: ^12.0.2
  path_provider: ^2.1.5
  google_sign_in: ^7.2.0
  # flutter_stripe 12.6.0 broke Android build (StripeAndroidPlugin.kt:380
  # cardParams unresolved). Pin tight until upstream cuts 12.6.1.
  flutter_stripe: 12.5.0
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^21.0.0
  qr_flutter: ^4.1.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  flutter_secure_storage: ^10.0.0
  csv: ^8.0.0
  syncfusion_flutter_xlsio: ^33.1.47
  pdf: ^3.11.2
  beautycita_core:
    path: ../packages/beautycita_core
  package_info_plus: ^9.0.0
  webview_flutter: ^4.13.1
  flutter_contacts: ^2.0.2
  cached_network_image: ^3.4.1
  sentry_flutter: ^9.16.0
  image_cropper: ^12.1.1
  image: ^4.1.2
  printing: ^5.14.3
  video_player: ^2.9.6

# stripe_android 12.6.0 + stripe_ios 12.6.0 ship with a Kotlin/Swift
# compile error (StripeAndroidPlugin.kt:380 cardParams unresolved).
# Force the transitive resolution back to 12.5.0 until 12.6.1 lands.
dependency_overrides:
  stripe_android: 12.5.0
  stripe_ios: 12.5.0
  stripe_platform_interface: 12.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  fake_async: ^1.3.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/categories/
    - assets/sounds/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/google_fonts/Poppins-Regular.ttf
        - asset: assets/google_fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/google_fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/google_fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/google_fonts/Poppins-ExtraBold.ttf
          weight: 800
    - family: Nunito
      fonts:
        - asset: assets/google_fonts/Nunito-Regular.ttf
        - asset: assets/google_fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/google_fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/google_fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/google_fonts/Nunito-ExtraBold.ttf
          weight: 800
