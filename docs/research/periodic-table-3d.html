<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Periodic Table</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;scrollbar-width:none}
::-webkit-scrollbar{display:none}
:root{--bg:#0a0a1a;--panel:#111128;--border:#2a2a4a;--text:#e0e0f0;--text-dim:#8888aa;--accent1:#ec4899;--accent2:#9333ea;--accent3:#3b82f6;--gradient:linear-gradient(135deg,var(--accent1),var(--accent2),var(--accent3))}
html,body{overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;width:100vw}
#canvas-container{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
canvas{display:block}

/* Control Panel */
#control-panel{position:absolute;top:0;left:0;width:300px;height:100%;background:rgba(17,17,40,0.92);border-right:1px solid var(--border);z-index:10;overflow-y:auto;padding:16px;backdrop-filter:blur(10px);transition:transform 0.3s}
#control-panel.collapsed{transform:translateX(-284px)}
#panel-toggle{position:absolute;right:-32px;top:50%;transform:translateY(-50%);width:32px;height:60px;background:var(--panel);border:1px solid var(--border);border-left:none;border-radius:0 8px 8px 0;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;font-size:16px}
.panel-section{margin-bottom:18px}
.panel-section h3{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);margin-bottom:8px}
.brand-title{font-size:20px;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.brand-sub{font-size:11px;color:var(--text-dim);margin-bottom:16px}

select,input[type=text]{width:100%;padding:8px 10px;background:#1a1a3a;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none;transition:border-color 0.2s}
select:focus,input:focus{border-color:var(--accent2)}
option{background:#1a1a3a}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;color:#fff;transition:all 0.2s}
.btn-gradient{background:var(--gradient)}
.btn-gradient:hover{opacity:0.85;transform:scale(1.02)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--accent2)}
.btn-outline.active{border-color:var(--accent1);color:var(--accent1)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-row{display:flex;gap:6px;flex-wrap:wrap}

.lang-toggle{display:flex;border-radius:6px;overflow:hidden;border:1px solid var(--border)}
.lang-toggle button{flex:1;padding:6px;background:transparent;border:none;color:var(--text-dim);cursor:pointer;font-size:12px;font-weight:600;transition:all 0.2s}
.lang-toggle button.active{background:var(--gradient);color:#fff}

.view-info{font-size:12px;color:var(--text-dim);line-height:1.5;margin-top:8px;padding:8px;background:rgba(255,255,255,0.03);border-radius:6px}
.view-info .learn-more{color:var(--accent1);cursor:pointer;font-size:11px;display:inline-block;margin-top:4px}
.view-info .expanded{display:none;margin-top:6px;color:var(--text-dim);font-size:11px;line-height:1.5}
.view-info.show-expanded .expanded{display:block}

.shortcuts{font-size:10px;color:var(--text-dim);line-height:1.8}
.shortcuts kbd{display:inline-block;padding:1px 5px;background:#1a1a3a;border:1px solid var(--border);border-radius:3px;font-family:monospace;font-size:10px}

/* Tooltip */
#tooltip{position:absolute;pointer-events:none;background:rgba(17,17,40,0.95);border:1px solid var(--border);border-radius:8px;padding:10px 14px;z-index:20;display:none;backdrop-filter:blur(8px);max-width:220px}
#tooltip .tt-symbol{font-size:28px;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#tooltip .tt-name{font-size:13px;color:var(--text)}
#tooltip .tt-number{font-size:11px;color:var(--text-dim)}
#tooltip .tt-cat{font-size:11px;color:var(--accent1);margin-top:2px}

/* Detail Panel */
#detail-panel{position:absolute;top:0;right:0;width:340px;height:100%;background:rgba(17,17,40,0.95);border-left:1px solid var(--border);z-index:15;transform:translateX(100%);transition:transform 0.3s;overflow-y:auto;backdrop-filter:blur(10px)}
#detail-panel.open{transform:translateX(0)}
#detail-close{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
#detail-close:hover{background:rgba(255,255,255,0.1)}
.detail-header{padding:20px;text-align:center;border-bottom:1px solid var(--border)}
.detail-symbol{font-size:56px;font-weight:800;line-height:1}
.detail-name{font-size:18px;margin-top:4px}
.detail-number{font-size:13px;color:var(--text-dim)}
.detail-cat-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;margin-top:6px;color:#fff}
.detail-props{padding:16px 20px}
.detail-props table{width:100%;border-collapse:collapse}
.detail-props td{padding:5px 0;font-size:12px;border-bottom:1px solid rgba(255,255,255,0.04)}
.detail-props td:first-child{color:var(--text-dim);width:45%}
.detail-props td:last-child{color:var(--text);text-align:right}
.detail-fun{padding:12px 20px;margin:0 20px 20px;background:rgba(255,255,255,0.03);border-radius:8px;font-size:12px;line-height:1.5;color:var(--text-dim)}
.detail-fun strong{color:var(--accent1)}

/* Loading */
#loading{position:absolute;top:0;left:0;width:100%;height:100%;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity 0.5s}
#loading.done{opacity:0;pointer-events:none}
#loading .spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--accent2);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{margin-top:16px;color:var(--text-dim);font-size:14px}

/* Keyboard Legend */
#kb-legend{position:fixed;bottom:16px;right:16px;z-index:50;background:rgba(10,10,26,0.85);border:1px solid var(--border);border-radius:8px;padding:8px;backdrop-filter:blur(10px);max-width:280px;font-size:10px;color:var(--text-dim);pointer-events:auto;display:none}
#kb-legend.visible{display:block}
#kb-legend .kb-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
#kb-legend .kb-title span{font-size:11px;font-weight:600;color:var(--text)}
#kb-legend .kb-close{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:14px;padding:0 2px;line-height:1}
#kb-legend .kb-close:hover{color:var(--text)}
#kb-legend .kb-grid{display:grid;grid-template-columns:auto 1fr;gap:1px 8px;align-items:center}
#kb-legend .kb-grid kbd{display:inline-block;padding:1px 4px;background:#1a1a3a;border:1px solid var(--border);border-radius:3px;font-family:monospace;font-size:9px;color:var(--text);text-align:center;min-width:18px}
#kb-legend .kb-grid .kb-desc{font-size:10px;color:var(--text-dim)}
#kb-legend .kb-sep{grid-column:1/-1;height:1px;background:var(--border);margin:3px 0}

/* Mobile hamburger */
#mobile-menu-btn{display:none;position:fixed;top:10px;left:10px;z-index:25;width:40px;height:40px;border-radius:8px;background:rgba(17,17,40,0.9);border:1px solid var(--border);color:var(--text);font-size:20px;cursor:pointer;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
#mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:8}

/* Responsive */
@media(min-width:769px){
  #control-panel{max-width:240px}
}
@media(max-width:768px){
  #mobile-menu-btn{display:flex}
  #control-panel{position:fixed;top:0;left:0;width:280px;height:100%;z-index:12;transform:translateX(-100%);transition:transform 0.3s}
  #control-panel.mobile-open{transform:translateX(0)}
  #control-panel.collapsed{transform:translateX(-100%)}
  #mobile-overlay.active{display:block}
  #detail-panel{width:100%}
  #kb-legend{bottom:10px;left:10px;right:auto;max-width:220px;font-size:9px}
  #kb-legend .kb-grid kbd{font-size:8px;min-width:16px}
  #kb-legend .kb-grid .kb-desc{font-size:9px}
  body{overflow:hidden;-webkit-overflow-scrolling:touch}
}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p id="loading-text">Loading periodic table...</p></div>

<button id="mobile-menu-btn" onclick="toggleMobileMenu()">&#9776;</button>
<div id="mobile-overlay" onclick="closeMobileMenu()"></div>
<div id="canvas-container"></div>

<div id="tooltip">
  <div class="tt-symbol"></div>
  <div class="tt-name"></div>
  <div class="tt-number"></div>
  <div class="tt-cat"></div>
</div>

<div id="control-panel">
  <div id="panel-toggle" onclick="togglePanel()">&#9664;</div>
  <div class="brand-title">3D Periodic Table</div>
  <div class="brand-sub" data-i18n="subtitle">Interactive Element Explorer</div>

  <div class="panel-section">
    <h3 data-i18n="langLabel">Language</h3>
    <div class="lang-toggle">
      <button id="lang-en" class="active" onclick="setLang('en')">EN</button>
      <button id="lang-es" onclick="setLang('es')">ES</button>
    </div>
  </div>

  <div class="panel-section">
    <h3 data-i18n="viewLabel">View Mode</h3>
    <select id="view-select" onchange="switchView(this.value)">
      <option value="standard" data-i18n-opt="viewStandard">Standard 2D (Flat)</option>
      <option value="spiral" data-i18n-opt="viewSpiral">Classic Spiral</option>
      <option value="electronegativity" data-i18n-opt="viewEN">Electronegativity Map</option>
      <option value="shell" data-i18n-opt="viewShell">Electron Shell</option>
      <option value="density" data-i18n-opt="viewDensity">Density vs Melting Point</option>
    </select>
    <div id="view-info" class="view-info"></div>
  </div>

  <div class="panel-section">
    <h3 data-i18n="colorLabel">Color Coding</h3>
    <select id="color-select" onchange="switchColor(this.value)">
      <option value="category" data-i18n-opt="colorCat">By Category</option>
      <option value="phase" data-i18n-opt="colorPhase">By Phase (Room Temp)</option>
      <option value="electroneg" data-i18n-opt="colorElectroneg">By Electronegativity</option>
      <option value="era" data-i18n-opt="colorEra">By Discovery Era</option>
    </select>
  </div>

  <div class="panel-section">
    <h3 data-i18n="searchLabel">Search</h3>
    <input type="text" id="search-input" placeholder="Name, symbol, or number..." data-i18n-ph="searchPH" oninput="searchElement(this.value)">
  </div>

  <div class="panel-section">
    <div class="btn-row">
      <button class="btn btn-gradient btn-sm" onclick="randomElement()" data-i18n="btnRandom">&#127922; Random</button>
      <button class="btn btn-outline btn-sm" onclick="exportPNG()" data-i18n="btnExport">&#128247; Export PNG</button>
      <button class="btn btn-outline btn-sm" id="btn-autorotate" onclick="toggleAutoRotate()" data-i18n="btnRotate">&#8635; Rotate</button>
    </div>
  </div>

  <div class="panel-section">
    <h3 data-i18n="shortcutsLabel">Keyboard Shortcuts</h3>
    <div class="shortcuts">
      <kbd>1</kbd>-<kbd>5</kbd> <span data-i18n="scViews">Switch views</span><br>
      <kbd>R</kbd> <span data-i18n="scRotate">Auto-rotate</span><br>
      <kbd>S</kbd> <span data-i18n="scStop">Stop rotation</span><br>
      <kbd>Esc</kbd> <span data-i18n="scClose">Close panel</span><br>
      <kbd>/</kbd> <span data-i18n="scSearch">Focus search</span>
    </div>
  </div>
</div>

<div id="detail-panel">
  <button id="detail-close" onclick="closeDetail()">&times;</button>
  <div class="detail-header">
    <div class="detail-symbol" id="d-symbol"></div>
    <div class="detail-name" id="d-name"></div>
    <div class="detail-number" id="d-number"></div>
    <div class="detail-cat-badge" id="d-cat"></div>
  </div>
  <div class="detail-props">
    <table id="d-table"></table>
  </div>
  <div class="detail-fun" id="d-fun"></div>
</div>

<div id="kb-legend">
  <div class="kb-title"><span id="kb-legend-title">Keyboard Shortcuts</span><button class="kb-close" onclick="toggleKbLegend()">&times;</button></div>
  <div class="kb-grid" id="kb-legend-grid"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

const CAT_COLORS = {
  alkali_metal:    0xff6b6b,
  alkaline_earth:  0xffa94d,
  transition_metal:0x51cf66,
  post_transition: 0x339af0,
  metalloid:       0xcc5de8,
  nonmetal:        0x20c997,
  halogen:         0xffd43b,
  noble_gas:       0x748ffc,
  lanthanide:      0xf06595,
  actinide:        0xe599f7,
  unknown:         0x868e96,
};

const PHASE_COLORS = { solid: 0x339af0, liquid: 0xff6b6b, gas: 0x51cf66, unknown: 0x868e96 };

function getEra(year) {
  if (year === null || year === undefined) return 'unknown';
  if (year <= 0 || year < 1700) return 'ancient';
  if (year < 1800) return 'e1700';
  if (year < 1900) return 'e1800';
  if (year < 2000) return 'e1900';
  return 'e2000';
}
const ERA_COLORS = { ancient: 0xffd43b, e1700: 0xffa94d, e1800: 0x51cf66, e1900: 0x339af0, e2000: 0xcc5de8, unknown: 0x868e96 };

function enGradientColor(val) {
  if (val === null || val === undefined) return 0x868e96;
  const t = Math.min(1, Math.max(0, val / 4.0));
  const r = Math.round(66 + t * (255 - 66));
  const g = Math.round(133 - t * 133);
  const b = Math.round(244 - t * (244 - 107));
  return (r << 16) | (g << 8) | b;
}

// ============================================================
// STANDARD TABLE LAYOUT (group, period, with lanthanide/actinide offset)
// ============================================================
function getStandardPos(el) {
  let col = el.group, row = el.period;
  // Lanthanides: z 57-71, row = 8.5
  if (el.z >= 57 && el.z <= 71) { col = 3 + (el.z - 57); row = 8.5; }
  // Actinides: z 89-103, row = 9.5
  if (el.z >= 89 && el.z <= 103) { col = 3 + (el.z - 89); row = 9.5; }
  return { x: (col - 9.5) * 2.2, y: -(row - 5) * 2.2, z: 0 };
}

// ============================================================
// THREE.JS SETUP
// ============================================================
let scene, camera, renderer, controls;
let elementMeshes = [];
let labelSprites = [];
let currentView = 'standard';
let currentColor = 'category';
let hoveredEl = null, selectedEl = null;
let autoRotate = false;
let raycaster, mouse;
let animating = false;
const ISLAND_RANGE = [114, 126];

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a1a);
  scene.fog = new THREE.FogExp2(0x0a0a1a, 0.008);

  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 5, 45);

  renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.minDistance = 5;
  controls.maxDistance = 120;
  controls.autoRotate = false;
  controls.autoRotateSpeed = 1.0;

  // Lights
  const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
  scene.add(ambientLight);
  const pointLight1 = new THREE.PointLight(0xec4899, 0.8, 100);
  pointLight1.position.set(20, 20, 20);
  scene.add(pointLight1);
  const pointLight2 = new THREE.PointLight(0x3b82f6, 0.8, 100);
  pointLight2.position.set(-20, -10, 20);
  scene.add(pointLight2);
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.4);
  dirLight.position.set(0, 30, 30);
  scene.add(dirLight);

  // Stars background
  const starsGeo = new THREE.BufferGeometry();
  const starPositions = [];
  for (let i = 0; i < 2000; i++) {
    starPositions.push((Math.random() - 0.5) * 400, (Math.random() - 0.5) * 400, (Math.random() - 0.5) * 400);
  }
  starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
  const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.3, transparent: true, opacity: 0.6 });
  scene.add(new THREE.Points(starsGeo, starsMat));

  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2();

  // Create elements
  ELEMENTS.forEach(el => {
    const baseRadius = el.radius ? Math.max(0.25, Math.min(1.2, el.radius / 200)) : 0.4;
    const geo = new THREE.SphereGeometry(baseRadius, 24, 24);
    const color = getColor(el);
    const mat = new THREE.MeshPhongMaterial({
      color: color,
      emissive: color,
      emissiveIntensity: 0.15,
      shininess: 80,
      transparent: true,
      opacity: 0.9,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.userData = el;

    // Island of stability indicator
    if (el.z >= ISLAND_RANGE[0] && el.z <= ISLAND_RANGE[1]) {
      const ringGeo = new THREE.RingGeometry(baseRadius + 0.15, baseRadius + 0.25, 32);
      const ringMat = new THREE.MeshBasicMaterial({ color: 0xffd43b, side: THREE.DoubleSide, transparent: true, opacity: 0.4 });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      mesh.add(ring);
    }

    // Label sprite
    const canvas = document.createElement('canvas');
    canvas.width = 64;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 32px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(el.sym, 32, 28);
    ctx.font = '14px sans-serif';
    ctx.fillStyle = '#aaaacc';
    ctx.fillText(el.z, 32, 50);
    const texture = new THREE.CanvasTexture(canvas);
    const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true, depthWrite: false });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.scale.set(1.5, 1.5, 1);
    sprite.position.set(0, baseRadius + 0.8, 0);
    mesh.add(sprite);
    labelSprites.push(sprite);

    const pos = getStandardPos(el);
    mesh.position.set(pos.x, pos.y, pos.z);
    scene.add(mesh);
    elementMeshes.push(mesh);
  });

  // Events
  renderer.domElement.addEventListener('mousemove', onMouseMove, false);
  renderer.domElement.addEventListener('click', onMouseClick, false);
  renderer.domElement.addEventListener('touchstart', onTouchStart, { passive: true });
  renderer.domElement.addEventListener('touchend', onTouchEnd, false);
  window.addEventListener('resize', onResize, false);
  window.addEventListener('keydown', onKeyDown, false);

  updateViewInfo();
  hideLoading();
  animate();
}

function hideLoading() {
  setTimeout(() => document.getElementById('loading').classList.add('done'), 300);
}

function animate() {
  requestAnimationFrame(animate);
  controls.autoRotate = autoRotate;
  controls.update();

  // Pulsing glow for hovered element
  if (hoveredEl) {
    const t = Date.now() * 0.003;
    hoveredEl.material.emissiveIntensity = 0.3 + Math.sin(t) * 0.15;
  }

  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ============================================================
// MOUSE/TOUCH INTERACTION
// ============================================================

// Track mouse/touch state to distinguish intentional clicks from orbit drags
let mouseDownPos = null;
let mouseDownTime = 0;
const CLICK_MAX_DIST = 5;    // px — movement beyond this = drag, not click
const CLICK_MAX_TIME = 300;   // ms — held longer than this = drag, not click
let touchStartPos = null;
let touchStartTime = 0;
const TAP_MAX_DIST = 12;     // px — more generous for fingers
const TAP_MAX_TIME = 250;    // ms — short tap only

// Desktop: track mousedown position to detect drag vs click
renderer.domElement.addEventListener('mousedown', function(e) {
  mouseDownPos = { x: e.clientX, y: e.clientY };
  mouseDownTime = Date.now();
}, false);

function onMouseMove(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(elementMeshes);

  // Reset previous hover
  if (hoveredEl && (!intersects.length || intersects[0].object !== hoveredEl)) {
    hoveredEl.material.emissiveIntensity = 0.15;
    hoveredEl.scale.set(1, 1, 1);
    unhighlightSimilar();
    hoveredEl = null;
  }

  const tooltip = document.getElementById('tooltip');
  if (intersects.length > 0) {
    const mesh = intersects[0].object;
    if (mesh.userData && mesh.userData.z) {
      hoveredEl = mesh;
      mesh.scale.set(1.2, 1.2, 1.2);
      highlightSimilar(mesh.userData);
      const el = mesh.userData;
      tooltip.querySelector('.tt-symbol').textContent = el.sym;
      tooltip.querySelector('.tt-name').textContent = lang === 'en' ? el.nameEn : el.nameEs;
      tooltip.querySelector('.tt-number').textContent = '#' + el.z + ' \u2022 ' + el.mass.toFixed(3) + ' u';
      tooltip.querySelector('.tt-cat').textContent = t('catNames')[el.cat] || el.cat;
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 15) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
      renderer.domElement.style.cursor = 'pointer';
    }
  } else {
    tooltip.style.display = 'none';
    renderer.domElement.style.cursor = 'default';
  }
}

function onMouseClick(e) {
  // Only select element on intentional click (short duration, minimal movement)
  if (!mouseDownPos) return;
  const dx = e.clientX - mouseDownPos.x;
  const dy = e.clientY - mouseDownPos.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const elapsed = Date.now() - mouseDownTime;
  mouseDownPos = null;
  if (dist > CLICK_MAX_DIST || elapsed > CLICK_MAX_TIME) return; // was a drag/orbit

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(elementMeshes);
  if (intersects.length > 0 && intersects[0].object.userData.z) {
    selectElement(intersects[0].object.userData);
  }
}

// Mobile: track touch start, only select on short stationary tap
function onTouchStart(e) {
  if (e.touches.length === 1) {
    touchStartPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    touchStartTime = Date.now();
  } else {
    touchStartPos = null; // multi-touch = pinch/zoom, never select
  }
}

function onTouchEnd(e) {
  if (!touchStartPos) return;
  if (e.changedTouches.length !== 1) { touchStartPos = null; return; }

  const touch = e.changedTouches[0];
  const dx = touch.clientX - touchStartPos.x;
  const dy = touch.clientY - touchStartPos.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const elapsed = Date.now() - touchStartTime;
  const pos = { x: touch.clientX, y: touch.clientY };
  touchStartPos = null;

  // Only count as tap if short duration AND minimal movement
  if (dist > TAP_MAX_DIST || elapsed > TAP_MAX_TIME) return; // was a drag/orbit

  mouse.x = (pos.x / window.innerWidth) * 2 - 1;
  mouse.y = -(pos.y / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(elementMeshes);
  if (intersects.length > 0 && intersects[0].object.userData.z) {
    selectElement(intersects[0].object.userData);
  }
}

function highlightSimilar(el) {
  elementMeshes.forEach(m => {
    if (m.userData.cat === el.cat && m !== hoveredEl) {
      m.material.emissiveIntensity = 0.35;
    }
  });
}

function unhighlightSimilar() {
  elementMeshes.forEach(m => {
    if (m !== hoveredEl && m !== selectedEl) {
      m.material.emissiveIntensity = 0.15;
    }
  });
}

// ============================================================
// ELEMENT SELECTION / DETAIL PANEL
// ============================================================
function selectElement(el) {
  selectedEl = el;
  const panel = document.getElementById('detail-panel');
  const color = getColorHex(el);
  document.getElementById('d-symbol').textContent = el.sym;
  document.getElementById('d-symbol').style.color = color;
  document.getElementById('d-name').textContent = lang === 'en' ? el.nameEn : el.nameEs;
  document.getElementById('d-number').textContent = '#' + el.z;
  const catBadge = document.getElementById('d-cat');
  catBadge.textContent = t('catNames')[el.cat] || el.cat;
  catBadge.style.background = color;

  const props = [
    [t('mass'), el.mass.toFixed(3) + ' u'],
    [t('phase'), t('phaseNames')[el.phase] || el.phase],
    [t('electroneg'), el.en !== null ? el.en.toFixed(2) : t('na')],
    [t('config'), el.config],
    [t('densityL'), el.density ? el.density + ' g/cm\u00b3' : t('na')],
    [t('melt'), el.mp !== null ? el.mp + ' \u00b0C' : t('na')],
    [t('boil'), el.bp !== null ? el.bp + ' \u00b0C' : t('na')],
    [t('radius'), el.radius ? el.radius + ' pm' : t('na')],
    [t('disc'), el.year === -1 ? (lang==='en'?'Ancient':'Antiguo') : (el.year || t('na'))],
  ];
  const table = document.getElementById('d-table');
  table.innerHTML = props.map(([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('');

  const fun = lang === 'en' ? el.funEn : el.funEs;
  document.getElementById('d-fun').innerHTML = `<strong>${t('funFact')}:</strong> ${fun}`;

  panel.classList.add('open');

  // Zoom camera toward element
  const mesh = elementMeshes.find(m => m.userData.z === el.z);
  if (mesh) {
    const target = mesh.position.clone();
    const camOffset = new THREE.Vector3(0, 2, 12);
    const dest = target.clone().add(camOffset);
    animateCamera(dest, target);
  }
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  selectedEl = null;
}

function animateCamera(destPos, destTarget) {
  const startPos = camera.position.clone();
  const startTarget = controls.target.clone();
  const duration = 800;
  const startTime = Date.now();
  function step() {
    const elapsed = Date.now() - startTime;
    const p = Math.min(1, elapsed / duration);
    const ease = 1 - Math.pow(1 - p, 3); // ease-out cubic
    camera.position.lerpVectors(startPos, destPos, ease);
    controls.target.lerpVectors(startTarget, destTarget, ease);
    controls.update();
    if (p < 1) requestAnimationFrame(step);
  }
  step();
}

// ============================================================
// COLOR
// ============================================================
function getColor(el) {
  switch (currentColor) {
    case 'category': return CAT_COLORS[el.cat] || 0x868e96;
    case 'phase': return PHASE_COLORS[el.phase] || 0x868e96;
    case 'electroneg': return enGradientColor(el.en);
    case 'era': return ERA_COLORS[getEra(el.year)] || 0x868e96;
    default: return 0x868e96;
  }
}

function getColorHex(el) {
  return '#' + getColor(el).toString(16).padStart(6, '0');
}

function switchColor(mode) {
  currentColor = mode;
  elementMeshes.forEach(m => {
    const c = getColor(m.userData);
    m.material.color.setHex(c);
    m.material.emissive.setHex(c);
  });
}

// ============================================================
// VIEWS
// ============================================================
function getViewPosition(el, view) {
  switch (view) {
    case 'standard': return getStandardPos(el);
    case 'spiral': {
      const angle = (el.z / 118) * Math.PI * 12;
      const r = 2 + el.z * 0.12;
      return { x: Math.cos(angle) * r, y: el.z * 0.15 - 9, z: Math.sin(angle) * r };
    }
    case 'electronegativity': {
      const enVal = el.en || 0;
      const rad = el.radius || 100;
      return { x: (el.z - 59) * 0.4, y: enVal * 6 - 6, z: (rad - 120) * 0.08 };
    }
    case 'shell': {
      let col = el.group, row = el.period;
      if (el.z >= 57 && el.z <= 71) { col = 3 + (el.z - 57); row = 6; }
      if (el.z >= 89 && el.z <= 103) { col = 3 + (el.z - 89); row = 7; }
      const ea = el.eaff || 0;
      return { x: (col - 9.5) * 2.2, y: -(row - 4) * 2.5, z: ea * 0.03 };
    }
    case 'density': {
      const dens = el.density || 0;
      const mp = el.mp || 0;
      return { x: Math.log10(Math.max(0.0001, dens)) * 6, y: (mp / 500) * 3, z: (el.z - 59) * 0.2 };
    }
    default: return getStandardPos(el);
  }
}

function switchView(view) {
  currentView = view;
  document.getElementById('view-select').value = view;
  const duration = 1000;
  const startTime = Date.now();
  const starts = elementMeshes.map(m => m.position.clone());
  const targets = elementMeshes.map(m => {
    const p = getViewPosition(m.userData, view);
    return new THREE.Vector3(p.x, p.y, p.z);
  });

  function step() {
    const elapsed = Date.now() - startTime;
    const p = Math.min(1, elapsed / duration);
    const ease = 1 - Math.pow(1 - p, 3);
    elementMeshes.forEach((m, i) => {
      m.position.lerpVectors(starts[i], targets[i], ease);
    });
    if (p < 1) requestAnimationFrame(step);
  }
  step();
  updateViewInfo();
}

function updateViewInfo() {
  const info = document.getElementById('view-info');
  const keys = { standard: 'Standard', spiral: 'Spiral', electronegativity: 'EN', shell: 'Shell', density: 'Density' };
  const key = keys[currentView];
  const short = t('viewInfo' + key);
  const long = t('viewInfo' + key + 'Exp');
  info.className = 'view-info';
  info.innerHTML = `${short} <span class="learn-more" onclick="this.parentElement.classList.toggle('show-expanded')">${t('learnMore')}</span><div class="expanded">${long}</div>`;
}

// ============================================================
// SEARCH
// ============================================================
function searchElement(query) {
  query = query.trim().toLowerCase();
  elementMeshes.forEach(m => {
    const el = m.userData;
    if (!query) {
      m.material.opacity = 0.9;
      m.material.emissiveIntensity = 0.15;
      return;
    }
    const nameMatch = (lang === 'en' ? el.nameEn : el.nameEs).toLowerCase();
    const match = el.sym.toLowerCase() === query || nameMatch.includes(query) || String(el.z) === query;
    m.material.opacity = match ? 1.0 : 0.1;
    m.material.emissiveIntensity = match ? 0.4 : 0.05;
  });
}

// ============================================================
// ACTIONS
// ============================================================
function randomElement() {
  const el = ELEMENTS[Math.floor(Math.random() * ELEMENTS.length)];
  selectElement(el);
}

function exportPNG() {
  renderer.render(scene, camera);
  const link = document.createElement('a');
  link.download = 'periodic-table-3d.png';
  link.href = renderer.domElement.toDataURL('image/png');
  link.click();
}

function toggleAutoRotate() {
  autoRotate = !autoRotate;
  document.getElementById('btn-autorotate').classList.toggle('active', autoRotate);
}

function togglePanel() {
  const panel = document.getElementById('control-panel');
  panel.classList.toggle('collapsed');
  const toggle = document.getElementById('panel-toggle');
  toggle.innerHTML = panel.classList.contains('collapsed') ? '&#9654;' : '&#9664;';
}

// ============================================================
// KEYBOARD LEGEND
// ============================================================
let kbLegendVisible = false;
let kbLegendFadeTimer = null;
let tabCycleIdx = -1;

const KB_SHORTCUTS = {
  en: [
    ['1-5', 'Switch view modes'],
    ['C', 'Cycle color coding'],
    ['N', 'Random element'],
    ['P', 'Export PNG'],
    ['/', 'Focus search'],
    ['Tab', 'Cycle elements'],
    ['---', ''],
    ['Space', 'Play/Pause rotation'],
    ['R', 'Toggle auto-rotate'],
    ['F', 'Toggle fullscreen'],
    ['H', 'Show/hide panel'],
    ['L', 'Toggle language'],
    ['? / K', 'This legend'],
    ['Esc', 'Close panels'],
    ['---', ''],
    ['Arrows', 'Rotate camera'],
    ['+ / -', 'Zoom in/out'],
    ['0', 'Reset camera'],
  ],
  es: [
    ['1-5', 'Cambiar vista'],
    ['C', 'Cambiar colores'],
    ['N', 'Elemento aleatorio'],
    ['P', 'Exportar PNG'],
    ['/', 'Buscar'],
    ['Tab', 'Recorrer elementos'],
    ['---', ''],
    ['Space', 'Play/Pausa rotacion'],
    ['R', 'Auto-rotar'],
    ['F', 'Pantalla completa'],
    ['H', 'Mostrar/ocultar panel'],
    ['L', 'Cambiar idioma'],
    ['? / K', 'Esta leyenda'],
    ['Esc', 'Cerrar paneles'],
    ['---', ''],
    ['Flechas', 'Rotar camara'],
    ['+ / -', 'Zoom'],
    ['0', 'Resetear camara'],
  ]
};

function buildKbLegend() {
  const grid = document.getElementById('kb-legend-grid');
  const shortcuts = KB_SHORTCUTS[lang] || KB_SHORTCUTS.en;
  document.getElementById('kb-legend-title').textContent = lang === 'es' ? 'Atajos de Teclado' : 'Keyboard Shortcuts';
  grid.innerHTML = shortcuts.map(([key, desc]) => {
    if (key === '---') return '<div class="kb-sep"></div>';
    return `<kbd>${key}</kbd><span class="kb-desc">${desc}</span>`;
  }).join('');
}

function toggleKbLegend() {
  kbLegendVisible = !kbLegendVisible;
  document.getElementById('kb-legend').classList.toggle('visible', kbLegendVisible);
}

function toggleMobileMenu() {
  const panel = document.getElementById('control-panel');
  const overlay = document.getElementById('mobile-overlay');
  const isOpen = panel.classList.contains('mobile-open');
  if (isOpen) { closeMobileMenu(); } else {
    panel.classList.add('mobile-open');
    panel.classList.remove('collapsed');
    overlay.classList.add('active');
  }
}
function closeMobileMenu() {
  const panel = document.getElementById('control-panel');
  const overlay = document.getElementById('mobile-overlay');
  panel.classList.remove('mobile-open');
  overlay.classList.remove('active');
}

function initKbLegend() {
  buildKbLegend();
  // kb legend starts hidden, toggled with ? or K
}

function requestFullscreen() {
  const el = document.documentElement;
  if (!document.fullscreenElement) {
    (el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen).call(el);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen).call(document);
  }
}

function onKeyDown(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
  const key = e.key;
  switch (key) {
    case '1': switchView('standard'); document.getElementById('view-select').value='standard'; break;
    case '2': switchView('spiral'); document.getElementById('view-select').value='spiral'; break;
    case '3': switchView('electronegativity'); document.getElementById('view-select').value='electronegativity'; break;
    case '4': switchView('shell'); document.getElementById('view-select').value='shell'; break;
    case '5': switchView('density'); document.getElementById('view-select').value='density'; break;
    case 'r': case 'R': toggleAutoRotate(); break;
    case ' ':
      e.preventDefault();
      toggleAutoRotate();
      break;
    case 'Escape':
      closeDetail();
      if (kbLegendVisible) { toggleKbLegend(); }
      break;
    case '/': e.preventDefault(); document.getElementById('search-input').focus(); break;
    case 'c': case 'C': {
      const modes = ['category','phase','electroneg','era'];
      const idx = (modes.indexOf(currentColor) + 1) % modes.length;
      switchColor(modes[idx]);
      document.getElementById('color-select').value = modes[idx];
      break;
    }
    case 'n': case 'N': randomElement(); break;
    case 'p': case 'P': exportPNG(); break;
    case 'f': case 'F': requestFullscreen(); break;
    case 'h': case 'H': togglePanel(); break;
    case 'l': case 'L': setLang(lang === 'en' ? 'es' : 'en'); break;
    case '?': case 'k': case 'K': toggleKbLegend(); break;
    case 'Tab': {
      e.preventDefault();
      tabCycleIdx = (tabCycleIdx + 1) % ELEMENTS.length;
      selectElement(ELEMENTS[tabCycleIdx]);
      break;
    }
    case '0': {
      camera.position.set(0, 5, 45);
      controls.target.set(0, 0, 0);
      controls.update();
      break;
    }
    case 'ArrowLeft':
      e.preventDefault();
      controls.target.copy(controls.target); // keep target
      const aLeft = 0.05;
      camera.position.applyAxisAngle(new THREE.Vector3(0,1,0), aLeft);
      controls.update();
      break;
    case 'ArrowRight':
      e.preventDefault();
      camera.position.applyAxisAngle(new THREE.Vector3(0,1,0), -0.05);
      controls.update();
      break;
    case 'ArrowUp':
      e.preventDefault();
      { const right = new THREE.Vector3().crossVectors(camera.getWorldDirection(new THREE.Vector3()), new THREE.Vector3(0,1,0)).normalize();
        camera.position.applyAxisAngle(right, 0.05);
        controls.update(); }
      break;
    case 'ArrowDown':
      e.preventDefault();
      { const right2 = new THREE.Vector3().crossVectors(camera.getWorldDirection(new THREE.Vector3()), new THREE.Vector3(0,1,0)).normalize();
        camera.position.applyAxisAngle(right2, -0.05);
        controls.update(); }
      break;
    case '+': case '=':
      camera.position.multiplyScalar(0.95);
      controls.update();
      break;
    case '-': case '_':
      camera.position.multiplyScalar(1.05);
      controls.update();
      break;
    case '[':
      camera.position.multiplyScalar(1.05);
      controls.update();
      break;
    case ']':
      camera.position.multiplyScalar(0.95);
      controls.update();
      break;
  }
}

// ============================================================
// LANGUAGE
// ============================================================
function setLang(l) {
  lang = l;
  document.getElementById('lang-en').classList.toggle('active', l === 'en');
  document.getElementById('lang-es').classList.toggle('active', l === 'es');

  // Update static i18n elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (I18N[lang][key]) el.textContent = I18N[lang][key];
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    const key = el.getAttribute('data-i18n-ph');
    if (I18N[lang][key]) el.placeholder = I18N[lang][key];
  });

  // Update select options
  const viewSel = document.getElementById('view-select');
  Array.from(viewSel.options).forEach(opt => {
    const key = opt.getAttribute('data-i18n-opt');
    if (key && I18N[lang][key]) opt.textContent = I18N[lang][key];
  });
  const colorSel = document.getElementById('color-select');
  Array.from(colorSel.options).forEach(opt => {
    const key = opt.getAttribute('data-i18n-opt');
    if (key && I18N[lang][key]) opt.textContent = I18N[lang][key];
  });

  updateViewInfo();

  // Re-render detail if open
  if (selectedEl) selectElement(selectedEl);

  // Rebuild keyboard legend
  buildKbLegend();
}

// ============================================================
// BOOT
// ============================================================
init();
initKbLegend();
</script>
