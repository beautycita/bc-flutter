# Portfolio pages — /p/<slug>
# Add this block BEFORE the SPA catch-all "location /" in beautycita.com.conf
# beautycita.com/p/salon-slug → serves loader.html which redirects to themed page

location ~ ^/p/([a-z0-9-]+)$ {
    root /var/www/beautycita.com/frontend/dist;
    try_files /portfolio/loader.html =404;
    add_header Cache-Control "no-cache";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.supabase.co; connect-src 'self' https://beautycita.com; frame-src 'self' https://www.openstreetmap.org; object-src 'none'; base-uri 'self';" always;
}

# Portfolio static assets (themes, shared JS/CSS)
location ^~ /portfolio/ {
    root /var/www/beautycita.com/frontend/dist;
    expires 1h;
    add_header Cache-Control "public, must-revalidate";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.supabase.co; connect-src 'self' https://beautycita.com; frame-src 'self' https://www.openstreetmap.org; object-src 'none'; base-uri 'self';" always;
}
