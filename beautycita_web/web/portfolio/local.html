<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portafolio | BeautyCita</title>
  <meta property="og:type" content="website">
  <meta property="og:title" content="Portafolio | BeautyCita">
  <meta property="og:description" content="Portafolio profesional de belleza">
  <link rel="stylesheet" href="shared.css">
  <link rel="icon" href="/favicon.ico">
  <style>
    /* LOCAL THEME — Map prominent, reviews featured, warm neighborhood feel */
    :root {
      --theme-accent: #bf360c;
      --theme-accent-light: #ffccbc;
      --theme-warm: #fff3e0;
    }
    body { background: var(--theme-warm); }

    .local-hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      min-height: 350px;
    }
    .local-hero-info {
      padding: 3rem 2.5rem;
      background: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .local-hero-info h1 { font-size: 2rem; color: var(--theme-accent); margin-bottom: 0.5rem; }
    .local-hero-info .tagline { color: var(--bc-gray); font-size: 1rem; margin-bottom: 1rem; }
    .local-hero-info .address { color: var(--bc-gray); font-size: 0.9rem; margin-bottom: 0.5rem; }
    .local-hero-info .phone { color: var(--bc-gray); font-size: 0.9rem; }
    .local-hero-info .rating { color: #f9a825; font-size: 1.1rem; margin-top: 0.75rem; }
    .local-hero-info .social-links { margin-top: 1.25rem; }
    .local-hero-map {
      background: #ddd;
      min-height: 300px;
    }
    .local-hero-map iframe { width: 100%; height: 100%; border: 0; }
    .local-hero-img {
      width: 80px; height: 80px; border-radius: var(--bc-radius); object-fit: cover;
      margin-bottom: 1rem; border: 3px solid var(--theme-accent-light);
    }

    .section-title { color: var(--theme-accent); }
    .tag { background: var(--theme-accent-light); color: var(--theme-accent); }

    /* Reviews are prominent — larger cards */
    .review-card {
      border-left: 3px solid var(--theme-accent);
      padding: 1.5rem;
    }
    .review-text { font-size: 1rem; font-style: italic; }
    .review-grid { grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); }

    .social-links a { background: var(--theme-accent-light); color: var(--theme-accent); }
    .social-links a:hover { background: var(--theme-accent); color: #fff; }

    .service-category h3 { color: var(--theme-accent); }
    .team-card { border-left: 3px solid var(--theme-accent-light); }

    @media (max-width: 768px) {
      .local-hero { grid-template-columns: 1fr; }
      .local-hero-info { padding: 2rem 1.5rem; }
      .local-hero-map { min-height: 250px; }
      .review-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="loading" data-portfolio="loading"><div class="spinner"></div></div>
  <div data-portfolio="not-available" style="display:none;align-items:center;justify-content:center;height:100vh;text-align:center;padding:2rem;color:#666">
    <div><h2>Este portafolio no est&aacute; disponible</h2><p>El sal&oacute;n a&uacute;n no ha publicado su portafolio.</p><a href="https://beautycita.com">Ir a BeautyCita</a></div>
  </div>

  <div data-portfolio="content" style="display:none">
    <!-- Hero: info + map side by side -->
    <div class="local-hero">
      <div class="local-hero-info">
        <img data-portfolio="salon-photo" class="local-hero-img" alt="" src="">
        <h1 data-portfolio="salon-name"></h1>
        <div class="tagline" data-portfolio="salon-tagline"></div>
        <div class="address" data-portfolio="salon-address"></div>
        <div class="phone" data-portfolio="salon-phone"></div>
        <div class="rating">
          <span data-portfolio="salon-rating"></span>
          <span style="color:#999;font-size:0.85rem;margin-left:0.4rem" data-portfolio="salon-review-count"></span>
        </div>
        <div class="social-links">
          <a data-portfolio="salon-whatsapp" href="#">WhatsApp</a>
          <a data-portfolio="salon-instagram" href="#">Instagram</a>
          <a data-portfolio="salon-facebook" href="#">Facebook</a>
          <a data-portfolio="salon-website" href="#">Web</a>
        </div>
      </div>
      <div class="local-hero-map" data-portfolio="map" data-section="section-map"></div>
    </div>

    <!-- Reviews (hero section for Local theme) -->
    <section class="section" data-section="section-reviews">
      <div class="container">
        <h2 class="section-title">Lo Que Dicen Nuestras Clientas</h2>
        <div class="review-grid" data-portfolio="reviews"></div>
      </div>
    </section>

    <!-- Bio -->
    <section class="section" data-section="section-bio" style="max-width:800px;margin:0 auto">
      <h2 class="section-title">Sobre Nosotros</h2>
      <p data-portfolio="salon-bio" style="font-size:1rem;color:#555;line-height:1.8"></p>
    </section>

    <!-- Hours -->
    <section class="section" data-section="section-hours">
      <div class="container" style="max-width:500px">
        <h2 class="section-title">Horario</h2>
        <div data-portfolio="salon-hours"></div>
      </div>
    </section>

    <!-- Services -->
    <section class="section" data-section="section-services">
      <div class="container">
        <h2 class="section-title">Servicios</h2>
        <div data-portfolio="services"></div>
      </div>
    </section>

    <!-- Team -->
    <section class="section" data-section="section-team">
      <div class="container">
        <h2 class="section-title">Equipo</h2>
        <div class="team-grid" data-portfolio="team"></div>
      </div>
    </section>

    <!-- Photos -->
    <section class="section" data-section="section-photos">
      <div class="container">
        <h2 class="section-title">Galeria</h2>
        <div class="photo-grid" data-portfolio="photos"></div>
      </div>
    </section>

    <footer class="portfolio-footer">
      powered by <a href="https://beautycita.com">BeautyCita</a>
    </footer>
  </div>

  <script src="shared.js"></script>
</body>
</html>
