name: Build iOS IPA (unsigned)

on:
  workflow_dispatch:
    inputs:
      build_note:
        description: 'Build note (optional)'
        required: false
        default: ''

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true

      - name: Install dependencies (core package)
        working-directory: packages/beautycita_core
        run: flutter pub get

      - name: Install dependencies (app)
        working-directory: beautycita_app
        run: flutter pub get

      - name: Install CocoaPods
        working-directory: beautycita_app/ios
        run: pod install

      - name: Build unsigned iOS app
        working-directory: beautycita_app
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Package unsigned IPA
        working-directory: beautycita_app
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r -9 ../../../beautycita-unsigned.ipa Payload/
          cd ../../..
          echo "=== IPA created ==="
          ls -lh beautycita-unsigned.ipa
          echo "=== Verifying Runner binary exists ==="
          unzip -l beautycita-unsigned.ipa | grep "Runner.app/Runner$" || echo "WARNING: Runner binary not found"
          echo "=== App bundle contents (first 30 lines) ==="
          unzip -l beautycita-unsigned.ipa | head -30

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: beautycita-ios-${{ github.run_number }}
          path: beautycita_app/beautycita-unsigned.ipa
          retention-days: 30
          if-no-files-found: error
