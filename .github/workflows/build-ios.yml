name: Build iOS IPA (v2)

on:
  workflow_dispatch:
    inputs:
      build_note:
        description: 'Build note (optional)'
        required: false
        default: ''

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: beautycita_app
        run: flutter pub get

      - name: Run analyzer
        working-directory: beautycita_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build iOS app (no codesign)
        working-directory: beautycita_app
        run: |
          # flutter build ios --no-codesign exits non-zero with
          # "requires Development Team" even though the .app is built.
          # The actual xcodebuild succeeds — Flutter just validates
          # signing post-build and fails. We suppress this known error.
          flutter build ios --no-codesign \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            || true

          # Verify the .app was actually built
          APP_PATH=$(find build/ios/iphoneos -name "Runner.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Runner.app was not built"
            exit 1
          fi
          APP_SIZE=$(du -sh "$APP_PATH" | cut -f1)
          echo "Runner.app built: $APP_PATH ($APP_SIZE)"

          # Verify it contains the actual binary
          if [ ! -f "$APP_PATH/Runner" ]; then
            echo "ERROR: Runner binary not found inside .app"
            ls -la "$APP_PATH/"
            exit 1
          fi
          echo "Runner binary exists: $(ls -lh "$APP_PATH/Runner" | awk '{print $5}')"

      - name: Package .app into IPA
        working-directory: beautycita_app
        run: |
          APP_PATH=$(find build/ios/iphoneos -name "Runner.app" -type d | head -1)
          echo "Packaging: $APP_PATH"

          mkdir -p /tmp/ipa-payload/Payload
          cp -r "$APP_PATH" /tmp/ipa-payload/Payload/

          mkdir -p build/ios/ipa
          cd /tmp/ipa-payload
          zip -r "$GITHUB_WORKSPACE/beautycita_app/build/ios/ipa/beautycita.ipa" Payload
          echo "IPA created:"
          ls -lh "$GITHUB_WORKSPACE/beautycita_app/build/ios/ipa/beautycita.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: beautycita-ios-${{ github.run_number }}
          path: beautycita_app/build/ios/ipa/beautycita.ipa
          retention-days: 30
          if-no-files-found: error
