name: Build iOS IPA (v2)

on:
  workflow_dispatch:
    inputs:
      build_note:
        description: 'Build note (optional)'
        required: false
        default: ''

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: beautycita_app
        run: flutter pub get

      - name: Run analyzer
        working-directory: beautycita_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Flutter build (Dart AOT + assets)
        working-directory: beautycita_app
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            || true
          # Verify Dart compilation succeeded
          if [ ! -d "build/ios/Release-iphoneos/App.framework" ]; then
            echo "ERROR: Dart AOT compilation failed"
            exit 1
          fi
          echo "Dart AOT + assets compiled successfully"

      - name: Create unsigned xcarchive
        working-directory: beautycita_app/ios
        run: |
          # Skip Flutter's xcode_backend.sh during archive (Dart already compiled)
          # by replacing the Run Script phase with a no-op
          sed -i '' 's|/bin/sh \\"$FLUTTER_ROOT/packages/flutter_tools/bin/xcode_backend.sh\\" build|echo \\"Skipping — Dart already compiled\\"|g' Runner.xcodeproj/project.pbxproj

          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $GITHUB_WORKSPACE/build/Runner.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -30

          echo "=== Archive contents ==="
          ls -la $GITHUB_WORKSPACE/build/Runner.xcarchive/Products/Applications/Runner.app/Runner 2>/dev/null && echo "Runner binary found" || echo "Runner binary MISSING"
          du -sh $GITHUB_WORKSPACE/build/Runner.xcarchive/Products/Applications/Runner.app/ 2>/dev/null

      - name: Package unsigned IPA
        run: |
          cd $GITHUB_WORKSPACE/build/Runner.xcarchive/Products
          mv Applications Payload
          zip -r -9 $GITHUB_WORKSPACE/build/beautycita-unsigned.ipa Payload

          echo "IPA created:"
          ls -lh $GITHUB_WORKSPACE/build/beautycita-unsigned.ipa

          # Verify IPA has Runner binary
          unzip -l $GITHUB_WORKSPACE/build/beautycita-unsigned.ipa | grep "Runner.app/Runner"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: beautycita-ios-${{ github.run_number }}
          path: build/beautycita-unsigned.ipa
          retention-days: 30
          if-no-files-found: error
