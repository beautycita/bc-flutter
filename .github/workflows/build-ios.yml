name: Build iOS IPA (v2)

on:
  workflow_dispatch:
    inputs:
      build_note:
        description: 'Build note (optional)'
        required: false
        default: ''

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: beautycita_app
        run: flutter pub get

      - name: Run analyzer
        working-directory: beautycita_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build iOS app (no codesign)
        working-directory: beautycita_app
        run: |
          flutter build ios --no-codesign \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            || true

          # Debug: find ALL .app directories and Runner binaries
          echo "=== All .app dirs under build/ ==="
          find build/ -name "*.app" -type d 2>/dev/null
          echo "=== All Runner binaries ==="
          find build/ -name "Runner" -type f 2>/dev/null
          echo "=== All .app dirs under DerivedData ==="
          find ~/Library/Developer/Xcode/DerivedData -name "Runner.app" -type d 2>/dev/null | head -5
          echo "=== Runner binaries in DerivedData ==="
          find ~/Library/Developer/Xcode/DerivedData -name "Runner" -not -path "*/Runner.app/*" -type f 2>/dev/null | head -5
          echo "=== build/ios directory tree (3 levels) ==="
          find build/ios -maxdepth 3 -type d 2>/dev/null
          echo "=== App.framework check ==="
          find build/ -name "App.framework" -type d 2>/dev/null

      - name: Package .app into IPA
        working-directory: beautycita_app
        run: |
          # Find Runner.app with actual binary content
          for dir in \
            "build/ios/iphoneos" \
            "build/ios/Release-iphoneos" \
            ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos; do
            if [ -f "$dir/Runner.app/Runner" ]; then
              APP_PATH="$dir/Runner.app"
              break
            fi
          done

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No Runner.app with binary found"
            echo "Attempting to find any Runner binary..."
            find build/ ~/Library/Developer/Xcode/DerivedData -name "Runner" -type f 2>/dev/null | while read f; do
              echo "  Found: $f ($(ls -lh "$f" | awk '{print $5}'))"
            done
            exit 1
          fi

          echo "Using: $APP_PATH ($(du -sh "$APP_PATH" | cut -f1))"
          mkdir -p /tmp/ipa-payload/Payload
          cp -r "$APP_PATH" /tmp/ipa-payload/Payload/
          mkdir -p build/ios/ipa
          cd /tmp/ipa-payload
          zip -r "$GITHUB_WORKSPACE/beautycita_app/build/ios/ipa/beautycita.ipa" Payload
          echo "IPA created:"
          ls -lh "$GITHUB_WORKSPACE/beautycita_app/build/ios/ipa/beautycita.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: beautycita-ios-${{ github.run_number }}
          path: beautycita_app/build/ios/ipa/beautycita.ipa
          retention-days: 30
          if-no-files-found: error
