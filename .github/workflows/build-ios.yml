name: Build iOS IPA (v2)

on:
  workflow_dispatch:
    inputs:
      build_note:
        description: 'Build note (optional)'
        required: false
        default: ''

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: beautycita_app
        run: flutter pub get

      - name: Run analyzer
        working-directory: beautycita_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Disable code signing in Xcode project
        working-directory: beautycita_app/ios
        run: |
          # Disable code signing so --no-codesign actually works
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = "iPhone Developer";/CODE_SIGN_IDENTITY = "-";/g' Runner.xcodeproj/project.pbxproj
          # Add CODE_SIGNING_ALLOWED=NO to all build configurations
          sed -i '' '/INFOPLIST_FILE/a\
				CODE_SIGNING_ALLOWED = NO;' Runner.xcodeproj/project.pbxproj

      - name: Build iOS app (no codesign)
        working-directory: beautycita_app
        run: |
          flutter build ios --no-codesign \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Package .app into IPA
        working-directory: beautycita_app
        run: |
          # flutter build ios --no-codesign puts the .app in build/ios/iphoneos/
          APP_PATH=$(find build/ios/iphoneos -name "*.app" -maxdepth 1 | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found in build/ios/iphoneos/"
            find build/ios/ -name "*.app" -type d 2>/dev/null
            exit 1
          fi
          echo "Found app: $APP_PATH"

          # Create IPA structure: Payload/Runner.app
          mkdir -p /tmp/ipa-payload/Payload
          cp -r "$APP_PATH" /tmp/ipa-payload/Payload/

          # Zip into .ipa
          mkdir -p build/ios/ipa
          cd /tmp/ipa-payload
          zip -r "$GITHUB_WORKSPACE/beautycita_app/build/ios/ipa/beautycita.ipa" Payload
          echo "IPA created at build/ios/ipa/beautycita.ipa"
          ls -lh "$GITHUB_WORKSPACE/beautycita_app/build/ios/ipa/beautycita.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: beautycita-ios-${{ github.run_number }}
          path: beautycita_app/build/ios/ipa/beautycita.ipa
          retention-days: 30
          if-no-files-found: error
