name: Build iOS IPA (unsigned)

on:
  workflow_dispatch:
    inputs:
      build_note:
        description: 'Build note (optional)'
        required: false
        default: ''

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true

      - name: Install dependencies (core package)
        working-directory: packages/beautycita_core
        run: flutter pub get

      - name: Install dependencies (app)
        working-directory: beautycita_app
        run: flutter pub get

      - name: Create .env asset
        working-directory: beautycita_app
        run: |
          printf '%s\n' \
            "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" \
            "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" \
            "GOOGLE_ANDROID_API_KEY=${{ secrets.GOOGLE_ANDROID_API_KEY }}" \
            "UBER_CLIENT_ID=${{ secrets.UBER_CLIENT_ID }}" \
            "UBER_REDIRECT_URI=https://beautycita.com/auth/uber-callback" \
            "UBER_SANDBOX=false" \
            "STRIPE_PUBLIC_KEY=${{ secrets.STRIPE_PUBLIC_KEY }}" \
            "MAPBOX_TOKEN=${{ secrets.MAPBOX_TOKEN }}" \
            "GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}" \
            > .env

      - name: Generate Xcode project config
        working-directory: beautycita_app
        run: |
          flutter build ios --config-only --release --no-codesign \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Install CocoaPods
        working-directory: beautycita_app/ios
        run: pod install

      - name: Build xcarchive
        working-directory: beautycita_app/ios
        run: |
          xcodebuild archive \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package unsigned IPA
        run: |
          echo "=== xcarchive contents ==="
          ls -la $RUNNER_TEMP/Runner.xcarchive/Products/Applications/Runner.app/ | head -20

          cd $RUNNER_TEMP/Runner.xcarchive/Products
          mv Applications Payload
          zip -r -9 $GITHUB_WORKSPACE/beautycita_app/beautycita-unsigned.ipa Payload

          echo "=== IPA created ==="
          ls -lh $GITHUB_WORKSPACE/beautycita_app/beautycita-unsigned.ipa
          echo "=== Verifying Runner binary ==="
          unzip -l $GITHUB_WORKSPACE/beautycita_app/beautycita-unsigned.ipa | grep "Runner.app/Runner$"
          echo "=== IPA contents (first 30 lines) ==="
          unzip -l $GITHUB_WORKSPACE/beautycita_app/beautycita-unsigned.ipa | head -30

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: beautycita-ios-${{ github.run_number }}
          path: beautycita_app/beautycita-unsigned.ipa
          retention-days: 30
          if-no-files-found: error
