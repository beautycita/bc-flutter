name: Build iOS IPA (unsigned)

on:
  workflow_dispatch:
    inputs:
      build_note:
        description: 'Build note (optional)'
        required: false
        default: ''

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true

      - name: Install dependencies (core package)
        working-directory: packages/beautycita_core
        run: flutter pub get

      - name: Install dependencies (app)
        working-directory: beautycita_app
        run: flutter pub get

      - name: Install CocoaPods
        working-directory: beautycita_app/ios
        run: pod install

      - name: Build unsigned iOS app
        working-directory: beautycita_app
        run: |
          # flutter build ios --no-codesign exits non-zero due to signing validation
          # but xcodebuild actually completes successfully. Ignore the exit code and
          # verify the binary exists in the next step.
          flutter build ios --release --no-codesign \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            || true

      - name: Verify and package unsigned IPA
        working-directory: beautycita_app
        run: |
          echo "=== Checking build output ==="
          ls -la build/ios/iphoneos/Runner.app/ || true
          ls -la build/ios/iphoneos/Runner.app/Runner || true

          if [ ! -f build/ios/iphoneos/Runner.app/Runner ]; then
            echo "ERROR: Runner binary not found. Build failed."
            echo "=== Checking DerivedData for binary ==="
            find ~/Library/Developer/Xcode/DerivedData -name "Runner" -type f 2>/dev/null | head -5
            echo "=== Checking build directory tree ==="
            find build/ios -name "Runner" -type f 2>/dev/null | head -10
            exit 1
          fi

          echo "=== Runner binary found! Packaging IPA ==="
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r -9 ../../../beautycita-unsigned.ipa Payload/
          cd ../../..
          echo "=== IPA created ==="
          ls -lh beautycita-unsigned.ipa
          echo "=== Verifying IPA contents ==="
          unzip -l beautycita-unsigned.ipa | grep "Runner.app/Runner$" || echo "WARNING: Runner binary not in IPA"
          unzip -l beautycita-unsigned.ipa | head -30

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: beautycita-ios-${{ github.run_number }}
          path: beautycita_app/beautycita-unsigned.ipa
          retention-days: 30
          if-no-files-found: error
