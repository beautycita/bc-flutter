name: Build iOS IPA (v2)

on:
  workflow_dispatch:
    inputs:
      build_note:
        description: 'Build note (optional)'
        required: false
        default: ''

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: beautycita_app
        run: flutter pub get

      - name: Run analyzer
        working-directory: beautycita_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build iOS IPA (no codesign)
        working-directory: beautycita_app
        run: |
          # flutter build ipa --no-codesign produces a full xcarchive
          # but exits non-zero because it can't export without signing.
          # The archive itself is complete — we just package it manually.
          flutter build ipa --no-codesign \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            || true

          echo "=== Searching for xcarchive and .app ==="
          find build/ios -name "*.xcarchive" -type d 2>/dev/null
          find build/ios -name "*.app" -type d 2>/dev/null
          find ~/Library/Developer/Xcode -name "Runner.app" -path "*/Release-iphoneos/*" -type d 2>/dev/null | head -3

      - name: Package into IPA
        working-directory: beautycita_app
        run: |
          # Look for the .app in the xcarchive first
          ARCHIVE_PATH=$(find build/ios/archive -name "*.xcarchive" -type d 2>/dev/null | head -1)

          if [ -n "$ARCHIVE_PATH" ]; then
            echo "Found xcarchive: $ARCHIVE_PATH"
            APP_PATH=$(find "$ARCHIVE_PATH" -name "Runner.app" -type d | head -1)
          fi

          # Fallback: check DerivedData
          if [ -z "$APP_PATH" ] || [ ! -f "$APP_PATH/Runner" ]; then
            echo "Checking DerivedData..."
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "Runner.app" -path "*/Release-iphoneos/*" -type d 2>/dev/null | head -1)
          fi

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No Runner.app found anywhere"
            exit 1
          fi

          if [ ! -f "$APP_PATH/Runner" ]; then
            echo "ERROR: Runner binary not found in $APP_PATH"
            ls -la "$APP_PATH/"
            exit 1
          fi

          echo "Using app: $APP_PATH ($(du -sh "$APP_PATH" | cut -f1))"

          mkdir -p /tmp/ipa-payload/Payload
          cp -r "$APP_PATH" /tmp/ipa-payload/Payload/

          mkdir -p build/ios/ipa
          cd /tmp/ipa-payload
          zip -r "$GITHUB_WORKSPACE/beautycita_app/build/ios/ipa/beautycita.ipa" Payload
          echo "IPA created:"
          ls -lh "$GITHUB_WORKSPACE/beautycita_app/build/ios/ipa/beautycita.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: beautycita-ios-${{ github.run_number }}
          path: beautycita_app/build/ios/ipa/beautycita.ipa
          retention-days: 30
          if-no-files-found: error
