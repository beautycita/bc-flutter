name: Build iOS IPA (v2)

on:
  workflow_dispatch:
    inputs:
      build_note:
        description: 'Build note (optional)'
        required: false
        default: ''

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: beautycita_app
        run: flutter pub get

      - name: Run analyzer
        working-directory: beautycita_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build iOS frameworks (Dart AOT compilation)
        working-directory: beautycita_app
        run: |
          # This compiles Dart to AOT, runs pod install, and builds
          # all dependent frameworks. It fails at the Runner.app linking
          # step due to missing Development Team, but that's OK — we'll
          # do the final link with xcodebuild ourselves.
          flutter build ios --no-codesign \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            || true

          # Verify Dart AOT output exists
          if [ ! -d "build/ios/Release-iphoneos/App.framework" ]; then
            echo "ERROR: App.framework not found — Dart compilation failed"
            exit 1
          fi
          echo "Dart AOT compilation successful"

      - name: Build Runner.app with xcodebuild (unsigned)
        working-directory: beautycita_app/ios
        run: |
          xcodebuild build \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build/ios/xc-derived \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tail -20

          # Find the built .app
          APP_PATH=$(find ../build/ios/xc-derived -name "Runner.app" -path "*/Release-iphoneos/*" -type d | head -1)
          echo "Built app: $APP_PATH"
          ls -la "$APP_PATH/Runner" 2>/dev/null || echo "WARNING: Runner binary not in .app yet"
          du -sh "$APP_PATH" 2>/dev/null

      - name: Package into IPA
        working-directory: beautycita_app
        run: |
          APP_PATH=$(find build/ios/xc-derived -name "Runner.app" -path "*/Release-iphoneos/*" -type d | head -1)

          if [ -z "$APP_PATH" ] || [ ! -f "$APP_PATH/Runner" ]; then
            echo "ERROR: Runner.app with binary not found"
            find build/ios/xc-derived -name "Runner.app" -type d 2>/dev/null
            find build/ios/xc-derived -name "Runner" -type f 2>/dev/null
            exit 1
          fi

          echo "Using: $APP_PATH ($(du -sh "$APP_PATH" | cut -f1))"
          mkdir -p /tmp/ipa-payload/Payload
          cp -r "$APP_PATH" /tmp/ipa-payload/Payload/
          mkdir -p build/ios/ipa
          cd /tmp/ipa-payload
          zip -r "$GITHUB_WORKSPACE/beautycita_app/build/ios/ipa/beautycita.ipa" Payload
          echo "IPA created:"
          ls -lh "$GITHUB_WORKSPACE/beautycita_app/build/ios/ipa/beautycita.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: beautycita-ios-${{ github.run_number }}
          path: beautycita_app/build/ios/ipa/beautycita.ipa
          retention-days: 30
          if-no-files-found: error
