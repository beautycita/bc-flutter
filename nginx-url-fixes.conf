# ============================================================================
# BeautyCita URL Routing Fixes
# ============================================================================
# INSTRUCTIONS: Replace the corresponding sections in
# /etc/nginx/sites-enabled/beautycita.com.conf
# Then run: sudo nginx -t && sudo systemctl reload nginx
# ============================================================================

# ── REPLACE the "Short URL for salon registration" block (lines ~465-468) ──
# OLD:
#   location ~ ^/salon/(.+)$ {
#       rewrite ^/salon/(.+)$ /supabase/functions/v1/salon-registro?ref=$1 redirect;
#   }
#
# NEW:

    # Clean salon URLs: beautycita.com/salon/mi-negocio
    location ~ ^/salon/(.+)$ {
        proxy_pass http://127.0.0.1:8000/functions/v1/salon-registro?ref=$1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


# ── ADD these blocks BEFORE the SPA catch-all "location /" block ──

    # Short Supabase path: /s/ instead of /supabase/
    # App .env can use SUPABASE_URL=https://beautycita.com/s
    # Both /s/ and /supabase/ will work (backwards compatible)
    location /s/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        proxy_read_timeout 86400;
        client_max_body_size 50M;
    }

    # Clean edge function URLs
    # beautycita.com/fn/aphrodite-chat → supabase functions
    location ~ ^/fn/(.+)$ {
        proxy_pass http://127.0.0.1:8000/functions/v1/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header apikey $http_apikey;
        proxy_buffering off;
        proxy_read_timeout 120;
        client_max_body_size 50M;
    }
